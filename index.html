<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishu Recursive AI Scanner</title>
    <style>
        /* Aapka purana CSS yahan aayega */
        body { background-color: #0b0e14; color: white; font-family: sans-serif; text-align: center; }
        .btn-start { background: linear-gradient(to right, #4b0082, #8a2be2); color: white; padding: 15px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #video-preview { width: 90%; max-width: 400px; border: 2px dashed #444; margin: 20px auto; display: block; }
    </style>
</head>
<body>

    <h2>VISHU RECURSIVE AI</h2>
    <div id="status">Status: Waiting for Scanner...</div>

    <video id="video-preview" autoplay playsinline muted></video>

    <button id="startBtn" class="btn-start">ACTIVATE FULL AUTO-SCANNER</button>

    <script>
        const startBtn = document.getElementById('startBtn');
        const videoElement = document.getElementById('video-preview');
        const statusDiv = document.getElementById('status');

        async function startCapture() {
            // Mobile par Audio capture support nahi hota, isliye ise false rakhna zaroori hai
            const displayMediaOptions = {
                video: {
                    cursor: "always"
                },
                audio: false
            };

            try {
                statusDiv.innerText = "Requesting Permission...";
                
                // Browser ka native popup trigger hoga
                const captureStream = await navigator.mediaDevices.getDisplayMedia(displayMediaOptions);
                
                // Video stream ko preview window mein dikhayein
                videoElement.srcObject = captureStream;
                statusDiv.innerText = "LIVE SCANNING...";
                statusDiv.style.color = "#00ff00";

                // Agar user screen sharing stop kar de toh
                captureStream.getVideoTracks()[0].onended = () => {
                    statusDiv.innerText = "Scanner Stopped";
                    statusDiv.style.color = "red";
                };

            } catch (err) {
                console.error("Error: " + err);
                statusDiv.innerText = "Permission Denied! Try Desktop Mode.";
                statusDiv.style.color = "red";
                alert("Please enable 'Desktop Site' in Kiwi/Chrome and try again.");
            }
        }

        // Button click event - Yahan se hi permission trigger honi chahiye
        startBtn.addEventListener('click', () => {
            startCapture();
        });
    </script>
</body>
</html>
