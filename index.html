<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISHU SM PREDICTOR PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #0b0d17; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: auto; }
        .input-box { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #bc13fe; background: #1a1c2c; color: white; outline: none; }
        .btn { width: 90%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        .login-btn { background: #bc13fe; color: white; box-shadow: 0 0 15px #bc13fe; }
        
        /* Prediction Card */
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(188, 19, 254, 0.3); margin-top: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        #result { font-size: 38px; font-weight: 900; margin: 15px 0; text-shadow: 0 0 10px currentColor; }
        
        /* History Section */
        .history-box { margin-top: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: left; }
        .history-title { font-size: 14px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .hist-item { display: inline-block; padding: 5px 12px; margin: 4px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        #app-screen { display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #bc13fe; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1 style="color: #bc13fe; letter-spacing: 2px;">VISHU AI v2.0</h1>
        <input type="email" id="email" class="input-box" placeholder="Registered Email">
        <input type="password" id="password" class="input-box" placeholder="Password">
        <button class="btn login-btn" onclick="login()">ENTER SERVER</button>
        <p id="msg" style="color: #ff4d4d; font-size: 13px;"></p>
    </div>

    <div id="app-screen">
        <h2 style="color: #bc13fe; margin-bottom: 5px;">VISHU PREDICTOR</h2>
        <p style="font-size: 10px; color: #39ff14; margin-top: 0;">● SERVER CONNECTED</p>
        
        <div class="card">
            <p style="color: #888; font-size: 14px;">PROBABILITY RESULT</p>
            <h2 id="result" style="color: #555;">READY</h2>
            <div id="loading-ui" style="display:none;"><div class="loader"></div><span style="font-size:12px;">SCANNING DATA...</span></div>
        </div>

        <button class="btn login-btn" id="scan-btn" onclick="predict()">START DEEP SCAN</button>

        <div class="history-box">
            <div class="history-title">RECENT PATTERNS (LAST 5)</div>
            <div id="history-list">
                <span style="color:gray; font-size:12px;">No data yet...</span>
            </div>
        </div>

        <br>
        <button style="background:none; color:gray; border:none; font-size: 12px;" onclick="logout()">LOGOUT</button>
    </div>
</div>

<audio id="scanSound" src="https://www.soundjay.com/buttons/sounds/button-20.mp3"></audio>

<script>
    // --- APNI FIREBASE CONFIG DALEIN ---
    const firebaseConfig = {
        apiKey: "AIzaSyCiKUh0v9GG3svQROdEF2FSg-Yf0y7D240",
        authDomain: "vishu-sm-predictor-e760b.firebaseapp.com",
        projectId: "vishu-sm-predictor-e760b",
        storageBucket: "vishu-sm-predictor-e760b.appspot.com",
        messagingSenderId: "990041638587",
        appId: "1:990041638587:web:1697860df62882ebe58b9e"
    };
    firebase.initializeApp(firebaseConfig);

    let history = [];

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        firebase.auth().signInWithEmailAndPassword(email, pass)
        .then(() => { showApp(); })
        .catch((err) => { document.getElementById('msg').innerText = "Login Failed!"; });
    }

    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
    }

    // Feature 3: Smart Prediction Logic
    function predict() {
        const scanBtn = document.getElementById('scan-btn');
        const resText = document.getElementById('result');
        const loadUI = document.getElementById('loading-ui');
        const sound = document.getElementById('scanSound');

        scanBtn.disabled = true;
        resText.style.display = 'none';
        loadUI.style.display = 'block';
        sound.play(); // Play Sound

        setTimeout(() => {
            loadUI.style.display = 'none';
            resText.style.display = 'block';
            
            // Logic: Random but feels professional
            const colors = [
                {name: "PURPLE", hex: "#bc13fe"},
                {name: "GREEN", hex: "#39ff14"},
                {name: "YELLOW", hex: "#ffff00"},
                {name: "L-GREEN", hex: "#90ee90"}
            ];
            
            const pick = colors[Math.floor(Math.random() * colors.length)];
            resText.innerText = pick.name;
            resText.style.color = pick.hex;

            updateHistory(pick);
            scanBtn.disabled = false;
        }, 2000);
    }

    function updateHistory(item) {
        history.unshift(item); // Add to start
        if(history.length > 5) history.pop(); // Keep only 5

        const histDiv = document.getElementById('history-list');
        histDiv.innerHTML = "";
        history.forEach(h => {
            histDiv.innerHTML += `<span class="hist-item" style="background:${h.hex}; color:black;">${h.name}</span>`;
        });
    }

    function logout() { firebase.auth().signOut().then(() => { location.reload(); }); }
    firebase.auth().onAuthStateChanged(user => { if(user) showApp(); });
</script>
</body>
</html>
