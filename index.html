<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISHU SM PREDICTOR</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #0b0d17; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .input-box { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #bc13fe; background: #1a1c2c; color: white; }
        .btn { width: 85%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn { background: #bc13fe; color: white; box-shadow: 0 0 15px #bc13fe; }
        #app-screen { display: none; }
        .planet { padding: 15px; margin: 5px; border-radius: 8px; border: none; color: white; font-weight: bold; width: 70px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #bc13fe;">VISHU PREDICTOR</h1>
        <input type="email" id="email" class="input-box" placeholder="Enter Email">
        <input type="password" id="password" class="input-box" placeholder="Enter Password">
        <button class="btn login-btn" onclick="login()">LOGIN / REGISTER</button>
        <p id="msg" style="font-size: 12px; color: red;"></p>
    </div>

    <div id="app-screen">
        <h3>Welcome To Vishu AI</h3>
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;">
            <p>Next Prediction:</p>
            <h2 id="result" style="color: #39ff14;">WAITING...</h2>
        </div>
        <br>
        <button class="btn login-btn" onclick="predict()">START SCAN</button>
        <br><br>
        <button style="background:none; color:gray; border:none;" onclick="logout()">Logout</button>
    </div>

<script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCiKUh0v9GG3svQROdEF2FSg-Yf0y7D240"
            authDomain: "vishu-sm-predictor-e760b.firebaseapp.com",
            projectId: "vishu-sm-predictor-e760b",
            storageBucket: "vishu-sm-predictor-e760b.firebasestorage.app",
            messagingSenderId: ""990041638587",
            appId: "1:990041638587:web:1697860df62882ebe58b9e",
        };
        firebase.initializeApp(firebaseConfig);

        // Login Logic
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            // Ye function login karega, agar account nahi hai toh naya bana dega
            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => { showApp(); })
            .catch((error) => {
                firebase.auth().createUserWithEmailAndPassword(email, pass)
                .then(() => { showApp(); })
                .catch((err) => { document.getElementById('msg').innerText = err.message; });
            });
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
        }

        function predict() {
            const list = ["PURPLE", "GREEN", "YELLOW", "L-GREEN"];
            document.getElementById('result').innerText = "SCANNING...";
            setTimeout(() => {
                document.getElementById('result').innerText = list[Math.floor(Math.random()*4)];
            }, 1000);
        }

        function logout() { firebase.auth().signOut().then(() => { location.reload(); }); }
        
        // Check if user is already logged in
        firebase.auth().onAuthStateChanged(user => { if(user) showApp(); });
    </script>
</body>
</html>
