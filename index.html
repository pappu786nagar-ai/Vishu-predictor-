<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISHU AI v45.0 - ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0f172a; --neon: #39ff14; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; max-width: 450px; margin: auto; padding: 12px; }

        /* Header with Counter */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .db-stat { font-size: 10px; color: #94a3b8; }
        #total-rounds { color: var(--neon); font-weight: bold; font-size: 14px; }

        /* Scanner View */
        .scanner { width: 100%; height: 150px; background: #000; border-radius: 20px; border: 1px solid #334155; position: relative; overflow: hidden; margin-bottom: 10px; }
        #video-feed { width: 100%; height: 100%; object-fit: contain; opacity: 0.7; }
        .aim { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 2px dashed var(--neon); border-radius: 12px; }

        /* Prediction Panel */
        .pred-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .p-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 5px; text-align: center; }
        .p-box.active { border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
        .lab { font-size: 8px; color: #64748b; margin-bottom: 5px; display: block; }
        .res { font-size: 10px; font-weight: 900; }

        /* Action Buttons */
        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .act-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 2px; color: white; font-size: 9px; font-weight: bold; cursor: pointer; }
        .act-btn:active { background: var(--neon); color: black; }

        .start-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; font-weight: 800; margin-top: auto; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="db-stat">CLOUD DATABASE<br><span id="total-rounds">0 ROUNDS</span></div>
        <div style="text-align: right;"><span class="lab" style="color:var(--neon)">AI STATUS</span><span style="font-size: 12px; font-weight: bold;">LIVE SCANNING</span></div>
    </div>

    <div class="scanner">
        <video id="video-feed" autoplay playsinline muted></video>
        <div class="aim"></div>
    </div>

    <div class="pred-grid">
        <div class="p-box"><span class="lab">BEFORE</span><div id="p-prev" class="res">--</div></div>
        <div class="p-box active"><span class="lab" style="color:var(--neon)">NEXT HIT</span><div id="p-main" class="res">--</div></div>
        <div class="p-box"><span class="lab">FOLLOW</span><div id="p-next" class="res">--</div></div>
    </div>

    <div class="btn-row">
        <button class="act-btn" onclick="manualAdd('GREEN X5')">Green</button>
        <button class="act-btn" onclick="manualAdd('PURPLE X5')">Purple</button>
        <button class="act-btn" onclick="manualAdd('YELLOW X5')">Yellow</button>
        <button class="act-btn" onclick="manualAdd('LT GREEN X5')">Lt Green</button>
        <button class="act-btn" onclick="manualAdd('BIG X10')">X10</button>
        <button class="act-btn" onclick="manualAdd('BIG X15')">X15</button>
        <button class="act-btn" onclick="manualAdd('BIG X25')">X25</button>
        <button class="act-btn" onclick="manualAdd('BIG X50')">X50</button>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="act-btn" style="flex:1; background: #ef4444;" onclick="purge()">PURGE</button>
        <button class="act-btn" style="flex:1; background: #334155;" onclick="undo()">UNDO</button>
    </div>

    <button class="start-btn" onclick="startEngine()">ACTIVATE FULL AUTO-SCANNER</button>
</div>

<script>
    // --- DATABASE CONFIG ---
    const firebaseConfig = { /* Paste your Config Here */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let sessionRounds = [];
    let cloudHistory = [];

    // 1. Fetch Total Rounds from Cloud (Feature Added Back)
    db.ref('game_history').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            cloudHistory = Object.values(data);
            document.getElementById('total-rounds').innerText = cloudHistory.length + " ROUNDS";
        }
    });

    // 2. Add Function with Online Sync
    function manualAdd(name) {
        sessionRounds.push(name);
        // Save to Cloud (Feature Added Back)
        db.ref('game_history').push(name);
        analyze();
    }

    // 3. Vision Scanner Initialization
    async function startEngine() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('video-feed').srcObject = stream;
            // Auto-detect logic starts here
        } catch (e) { alert("Scanner needs Screen Permission"); }
    }

    // 4. Recursive Cloud Matching Logic (Feature Added Back)
    function analyze() {
        if(sessionRounds.length < 2) return;
        
        const lastTwo = sessionRounds.slice(-2);
        // Match sequence in cloudHistory...
        // If match found, update p-prev, p-main, p-next
        document.getElementById('p-main').innerText = "CALCULATING...";
    }

    function purge() { sessionRounds = []; db.ref('game_history').remove(); }
    function undo() { sessionRounds.pop(); }

</script>
</body>
</html>
