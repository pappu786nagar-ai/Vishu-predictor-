<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISHU AI PATTERN LOGIC</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        .btn { width: 90%; padding: 15px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .purple-btn { background: #bc13fe; color: white; box-shadow: 0 0 15px #bc13fe; }
        
        /* Logic Reason Box */
        .reason-box { background: rgba(57, 255, 20, 0.05); border: 1px dashed #39ff14; color: #39ff14; padding: 10px; border-radius: 10px; font-size: 11px; margin-bottom: 15px; display: none; text-transform: uppercase; letter-spacing: 1px; }

        .prediction-area { background: rgba(188, 19, 254, 0.05); border: 1px solid #bc13fe; border-radius: 20px; padding: 20px; margin: 15px 0; position: relative; }
        .next-box { display: flex; justify-content: space-around; margin-top: 15px; gap: 5px; }
        .pred-item { padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; width: 32%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .planet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .p-btn { padding: 10px 2px; border-radius: 8px; border: 1px solid #444; font-size: 9px; font-weight: bold; cursor: pointer; color: white; }
        #app-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1 style="color: #bc13fe;">VISHU AI LOGIC</h1>
        <input type="email" id="email" style="width:80%; padding:12px; margin:10px; border-radius:8px; background:#1a1c2c; color:white; border:1px solid #bc13fe;" placeholder="Email">
        <input type="password" id="password" style="width:80%; padding:12px; margin:10px; border-radius:8px; background:#1a1c2c; color:white; border:1px solid #bc13fe;" placeholder="Password">
        <button class="btn purple-btn" onclick="login()">CONNECT ENGINE</button>
    </div>

    <div id="app-screen">
        <div id="input-display" style="display:flex; justify-content:center; gap:5px; margin-bottom:15px;"></div>

        <div class="planet-grid">
            <button class="p-btn" style="background:#bc13fe" onclick="addData('PURPLE X5', '#bc13fe')">P-X5</button>
            <button class="p-btn" style="background:#39ff14; color:black;" onclick="addData('GREEN X5', '#39ff14')">G-X5</button>
            <button class="p-btn" style="background:#ffff00; color:black;" onclick="addData('YELLOW X5', '#ffff00')">Y-X5</button>
            <button class="p-btn" style="background:#90ee90; color:black;" onclick="addData('L-GREEN X5', '#90ee90')">LG-X5</button>
            <button class="p-btn" style="background:#1a1c2c; border:1px solid #ff4d4d" onclick="addData('BIG X10', '#ff4d4d')">X10</button>
            <button class="p-btn" style="background:#1a1c2c; border:1px solid #ff4d4d" onclick="addData('BIG X25', '#ff4d4d')">X25</button>
            <button class="p-btn" style="background:#1a1c2c; border:1px solid #ff4d4d" onclick="addData('BIG X50', '#ff4d4d')">X50</button>
            <button class="p-btn" style="background:gray;" onclick="resetData()">CLEAR</button>
        </div>

        <div class="prediction-area">
            <div id="reason-text" class="reason-box"></div>
            <div id="wait-msg">Enter 8 Data Points to Analyze</div>
            <div id="result-ui" style="display:none;">
                <div class="next-box">
                    <div id="p1" class="pred-item"></div>
                    <div id="p2" class="pred-item"></div>
                    <div id="p3" class="pred-item"></div>
                </div>
            </div>
        </div>

        <button class="btn purple-btn" id="ai-btn" onclick="deepScan()" disabled>DEEP SCAN & ANALYZE</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiKUh0v9GG3svQROdEF2FSg-Yf0y7D240",
        authDomain: "vishu-sm-predictor-e760b.firebaseapp.com",
        projectId: "vishu-sm-predictor-e760b",
        storageBucket: "vishu-sm-predictor-e760b.appspot.com",
        messagingSenderId: "990041638587",
        appId: "1:990041638587:web:1697860df62882ebe58b9e",
        databaseURL: "https://vishu-sm-predictor-e760b-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let userInput = [];

    const planets = [
        {n: "PURPLE X5", c: "#bc13fe"}, {n: "GREEN X5", c: "#39ff14"}, 
        {n: "YELLOW X5", c: "#ffff00"}, {n: "L-GREEN X5", c: "#90ee90"},
        {n: "BIG X10", c: "#ff4d4d"}, {n: "BIG X25", c: "#ff4d4d"}
    ];

    const logicReasons = [
        "Mirror Pattern Detected in DB",
        "AB-AB Sequence Matched",
        "AA-BB Pattern Probability High",
        "AA-B-AA Sequence Identified",
        "Repeat Pattern Sync Found",
        "Old Sequence Match (v2.0 Logic)",
        "Latest Server Pattern Reading"
    ];

    function addData(name, color) {
        if(userInput.length >= 8) userInput.shift();
        userInput.push({name, color});
        renderInput();
        if(userInput.length === 8) document.getElementById('ai-btn').disabled = false;
    }

    function renderInput() {
        const display = document.getElementById('input-display');
        display.innerHTML = userInput.map(i => `<div style="width:12px; height:12px; border-radius:50%; background:${i.color}"></div>`).join("");
    }

    function deepScan() {
        document.getElementById('wait-msg').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        
        // 1. Logic Selection
        const reason = logicReasons[Math.floor(Math.random() * logicReasons.length)];
        const rBox = document.getElementById('reason-text');
        rBox.innerText = "Reason: " + reason;
        rBox.style.display = 'block';

        // 2. Unique Prediction
        let available = [...planets];
        let preds = [];
        for(let i=1; i<=3; i++) {
            let idx = Math.floor(Math.random() * available.length);
            let pick = available[idx];
            available.splice(idx, 1);
            preds.push(pick.n);
            const el = document.getElementById('p' + i);
            el.innerText = pick.n;
            el.style.background = pick.c;
            el.style.color = (pick.c === '#bc13fe' || pick.c === '#ff4d4d') ? 'white' : 'black';
        }

        // 3. Save with Reason to Firebase (Cloud Recovery)
        const user = firebase.auth().currentUser;
        const logPath = 'game_logs/' + user.email.replace(/\./g, '_');
        database.ref(logPath).push({
            input: userInput.map(u => u.name),
            predicted: preds,
            reason: reason,
            timestamp: new Date().toLocaleString()
        });
    }

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        firebase.auth().signInWithEmailAndPassword(email, pass).then(() => showApp());
    }

    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
    }

    firebase.auth().onAuthStateChanged(user => { if(user) showApp(); });
</script>
</body>
</html>
