<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISHU AI v22.0 - SEQUENCE MATCH</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --neon: #39ff14; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { height: 100vh; margin: 0; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); color: white; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: auto; padding: 15px; }
        
        /* High-Visibility Match Display */
        .match-status-box { 
            background: rgba(0,0,0,0.5); border: 2px solid var(--border); 
            padding: 15px; border-radius: 24px; margin-bottom: 12px; 
            text-align: center; position: relative; overflow: hidden;
        }
        .match-label { font-size: 10px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
        #match-rank { font-size: 24px; font-weight: 900; display: block; margin-top: 5px; transition: 0.3s; color: #475569; }
        .match-found { color: var(--neon) !important; text-shadow: 0 0 15px var(--neon); }

        .planet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        .p-btn { padding: 14px; border-radius: 16px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.03); color: white; font-size: 12px; font-weight: 700; cursor: pointer; }
        .p-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .pred-display { margin-top: auto; padding: 25px 15px; background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .pred-row { display: flex; justify-content: space-around; gap: 8px; margin-top: 15px; }
        .p-box { flex: 1; padding: 18px 5px; border-radius: 15px; font-size: 10px; font-weight: 800; display: none; color: white; border: 1px solid rgba(255,255,255,0.1); }

        .main-btn { width: 100%; padding: 20px; border-radius: 20px; margin-top: 15px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(99,102,241,0.3); }
        .main-btn:disabled { opacity: 0.3; filter: grayscale(1); }
        
        .dot-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 15px; padding: 5px; overflow-x: auto; }
        .dot { min-width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: 0.4s; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" style="justify-content: center; display: flex; flex-direction: column; height:100%;">
        <div style="background: var(--glass); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid var(--border);">
            <h2 style="margin:0; font-size: 28px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VISHU AI v22.0</h2>
            <p style="color: #94a3b8; font-size: 10px; margin-bottom: 30px;">SEQUENCE MATCHING ENGINE</p>
            <input type="email" id="email" placeholder="User Email">
            <input type="password" id="password" placeholder="Access Key">
            <button class="main-btn" onclick="handleAuth()">LOGIN ENGINE</button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <div class="match-status-box">
            <div class="match-label">Sequence Search Results</div>
            <span id="match-rank">Awaiting Rounds</span>
        </div>

        <div style="background: var(--glass); padding: 15px; border-radius: 24px; border: 1px solid var(--border);">
            <div class="dot-row" id="dot-display"></div>

            <div class="planet-grid">
                <button class="p-btn" onclick="addData('GREEN X5', '#39ff14')">GREEN X5</button>
                <button class="p-btn" onclick="addData('PURPLE X5', '#bc13fe')">PURPLE X5</button>
                <button class="p-btn" onclick="addData('YELLOW X5', '#ffff00')">YELLOW X5</button>
                <button class="p-btn" onclick="addData('LIGHT GREEN X5', '#90ee90')">LT GREEN X5</button>
                <button class="p-btn" onclick="addData('BIG X10', '#ff4d4d')">BIG X10</button>
                <button class="p-btn" onclick="addData('BIG X15', '#ff8c00')">BIG X15</button>
                <button class="p-btn" onclick="addData('BIG X25', '#00ffff')">BIG X25</button>
                <button class="p-btn" onclick="addData('BIG X50', '#ff00ff')">BIG X50</button>
                <button class="p-btn" style="background:#1e293b" onclick="undoLast()">UNDO</button>
                <button class="p-btn" style="background:#1e293b" onclick="resetData()">PURGE</button>
            </div>
        </div>

        <div class="pred-display">
            <div id="wait-msg" style="font-size: 11px; color: #64748b; text-transform: uppercase;">Engine Idle</div>
            <div class="pred-row">
                <div id="p1" class="p-box"></div>
                <div id="p2" class="p-box"></div>
                <div id="p3" class="p-box"></div>
            </div>
        </div>

        <button class="main-btn" id="ai-btn" onclick="executeInfiniteScan()" disabled>START RECURSIVE MATCH</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCiKUh0v9GG3svQROdEF2FSg-Yf0y7D240",
        authDomain: "vishu-sm-predictor-e760b.firebaseapp.com",
        projectId: "vishu-sm-predictor-e760b",
        databaseURL: "https://vishu-sm-predictor-e760b-default-rtdb.firebaseio.com/",
        appId: "1:990041638587:web:1697860df62882ebe58b9e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let userInput = []; 
    let cloudHistory = []; 

    function loadHistory() {
        db.ref('global_history').limitToLast(1500).on('value', (snap) => {
            if(snap.exists()) cloudHistory = Object.values(snap.val());
        });
    }

    function addData(name, color) {
        userInput.push(name);
        db.ref('global_history').push(name);
        renderDots();
        document.getElementById('ai-btn').disabled = (userInput.length < 2);
        document.getElementById('match-rank').innerText = "Rounds In: " + userInput.length;
        document.getElementById('match-rank').classList.remove('match-found');
    }

    function renderDots() {
        const container = document.getElementById('dot-display');
        container.innerHTML = "";
        const colors = { 'GREEN X5': '#39ff14', 'PURPLE X5': '#bc13fe', 'YELLOW X5': '#ffff00', 'LIGHT GREEN X5': '#90ee90', 'BIG X10': '#ff4d4d', 'BIG X15': '#ff8c00', 'BIG X25': '#00ffff', 'BIG X50': '#ff00ff' };
        userInput.slice(-15).forEach(name => {
            const d = document.createElement('div');
            d.className = 'dot';
            d.style.background = colors[name];
            d.style.boxShadow = `0 0 8px ${colors[name]}`;
            container.appendChild(d);
        });
    }

    // --- RECURSIVE MATCH LOGIC ---
    async function executeInfiniteScan() {
        const rankEl = document.getElementById('match-rank');
        const btn = document.getElementById('ai-btn');
        btn.disabled = true;
        
        let foundMatch = false;
        let nextPrediction = "";
        let bestSize = 0;

        // Sequence starts from 100 or current total rounds, down to 1
        let maxDepth = Math.min(userInput.length, 100);

        for (let size = maxDepth; size >= 1; size--) {
            // Live Update: dikhayega ki kaunsa sequence AI check kar raha hai
            rankEl.innerText = `SCANNING: ${size} RDS`;
            rankEl.style.color = "#818cf8";
            
            await new Promise(r => setTimeout(r, 20)); // Scanning feel

            const currentPattern = userInput.slice(-size).join('|');

            for (let i = 0; i < cloudHistory.length - size; i++) {
                const historyPattern = cloudHistory.slice(i, i + size).join('|');
                if (currentPattern === historyPattern) {
                    nextPrediction = cloudHistory[i + size];
                    bestSize = size;
                    foundMatch = true;
                    break;
                }
            }
            if (foundMatch) break;
        }

        if (foundMatch) {
            rankEl.innerText = `FOUND: ${bestSize} RDS`;
            rankEl.classList.add('match-found');
            showResults(nextPrediction);
        } else {
            rankEl.innerText = "NO MATCH FOUND";
            rankEl.style.color = "#ef4444";
            showResults();
        }
        btn.disabled = false;
    }

    function showResults(match) {
        const boxes = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];
        const allPlanets = [
            {n: "GREEN X5", c: "#22c55e"}, {n: "PURPLE X5", c: "#a855f7"}, 
            {n: "YELLOW X5", c: "#eab308"}, {n: "LIGHT GREEN X5", c: "#4ade80"},
            {n: "BIG X10", c: "#ef4444"}, {n: "BIG X15", c: "#f97316"}, 
            {n: "BIG X25", c: "#06b6d4"}, {n: "BIG X50", c: "#ec4899"} 
        ];

        let picks = [];
        if(match) picks.push(allPlanets.find(p => p.n === match));
        while(picks.length < 3) {
            let r = allPlanets[Math.floor(Math.random() * allPlanets.length)];
            if(!picks.includes(r)) picks.push(r);
        }

        picks.forEach((p, i) => {
            boxes[i].innerHTML = p.n.replace(" ", "<br>");
            boxes[i].style.background = `linear-gradient(135deg, ${p.c}, #000)`;
            boxes[i].style.display = 'block';
        });
        document.getElementById('wait-msg').innerText = "Prediction Decoded";
    }

    function undoLast() { userInput.pop(); renderDots(); }
    function resetData() { userInput = []; renderDots(); document.getElementById('ai-btn').disabled = true; document.getElementById('match-rank').innerText = "Awaiting Rounds"; }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            if(err.code === 'auth/user-not-found') auth.createUserWithEmailAndPassword(email, pass);
        });
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            loadHistory();
        }
    });
</script>
</body>
</html>
