<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISHU AI NEURAL BRAIN v14.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --purple: #bc13fe; --neon-green: #39ff14; --dark-bg: #05070a; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        
        /* Stats Dashboard */
        .stats-header { background: rgba(57, 255, 20, 0.05); border: 1px solid var(--neon-green); padding: 12px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        #data-counter { color: var(--neon-green); font-weight: bold; font-size: 20px; }

        /* Neural Dots */
        .dot-row { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #1a1c2c; border: 1px solid #333; transition: 0.3s; }

        /* Grid System */
        .planet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .p-btn { padding: 14px 2px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .p-btn:active { transform: scale(0.9); }
        .ctrl-btn { grid-column: span 2; font-size: 12px; letter-spacing: 1px; }

        /* AI Prediction Box */
        .engine-box { background: rgba(188, 19, 254, 0.05); border: 1px solid var(--purple); border-radius: 25px; padding: 20px; margin: 15px 0; min-height: 100px; }
        .reason-line { color: var(--neon-green); font-size: 11px; border: 1px dashed var(--neon-green); padding: 8px; border-radius: 8px; margin-bottom: 15px; display: none; text-transform: uppercase; font-weight: bold; }
        
        .pred-row { display: flex; justify-content: space-around; gap: 8px; }
        .p-box { flex: 1; padding: 15px 2px; border-radius: 12px; font-size: 11px; font-weight: 900; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        /* Main Scan Button */
        .main-btn { width: 100%; padding: 20px; border-radius: 40px; background: var(--purple); color: white; border: none; font-weight: bold; font-size: 16px; box-shadow: 0 0 20px var(--purple); cursor: pointer; }
        .main-btn:disabled { background: #222; box-shadow: none; color: #555; }

        /* Cloud Recovery Section */
        .cloud-logs { margin-top: 25px; background: #0a0c14; border-radius: 20px; padding: 15px; text-align: left; max-height: 180px; overflow-y: auto; font-size: 11px; border: 1px solid #1a1c2c; }
        .log-item { border-bottom: 1px solid #222; padding: 8px 0; }
        
        /* Login Screen */
        #login-screen { padding: 80px 20px; }
        .input-field { width: 85%; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: #111; color: white; border: 1px solid #333; outline: none; }
    </style>
</head>
<body>

<div class="container" id="app-screen" style="display:none;">
    <div class="stats-header">
        <span style="font-size:10px;">NEURAL BRAIN SYNCED</span>
        <span id="data-counter">0</span>
    </div>

    <div class="dot-row" id="dot-display">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="planet-grid">
        <button class="p-btn" style="background:#bc13fe" onclick="addData('PURPLE X5', '#bc13fe')">P-X5</button>
        <button class="p-btn" style="background:#39ff14; color:black;" onclick="addData('GREEN X5', '#39ff14')">G-X5</button>
        <button class="p-btn" style="background:#ffff00; color:black;" onclick="addData('YELLOW X5', '#ffff00')">Y-X5</button>
        <button class="p-btn" style="background:#90ee90; color:black;" onclick="addData('L-GREEN X5', '#90ee90')">LG-X5</button>
        
        <button class="p-btn" style="background:#ff4d4d;" onclick="addData('BIG X10', '#ff4d4d')">X10</button>
        <button class="p-btn" style="background:#ff8c00;" onclick="addData('BIG X15', '#ff8c00')">X15</button>
        <button class="p-btn" style="background:#00ffff; color:black;" onclick="addData('BIG X25', '#00ffff')">X25</button>
        <button class="p-btn" style="background:#ff00ff;" onclick="addData('BIG X50', '#ff00ff')">X50</button>

        <button class="p-btn ctrl-btn" style="background:#444;" onclick="undoLast()">↩ UNDO</button>
        <button class="p-btn ctrl-btn" style="background:#222;" onclick="resetData()">🗑 CLEAR</button>
    </div>

    <div class="engine-box">
        <div id="reason-text" class="reason-line"></div>
        <div id="wait-msg" style="font-size:12px; color:#555;">[ ENTER 8 ROUNDS TO SCAN ]</div>
        <div class="pred-row" id="result-ui">
            <div id="p1" class="p-box"></div>
            <div id="p2" class="p-box"></div>
            <div id="p3" class="p-box"></div>
        </div>
    </div>

    <button class="main-btn" id="ai-btn" onclick="deepScan()" disabled>INITIALIZE DEEP SCAN</button>

    <div class="cloud-logs">
        <p style="color:var(--purple); margin:0 0 10px 0; font-weight:bold;">RECOVERED CLOUD LOGS:</p>
        <div id="logs-list" style="color:#444;">Connecting to server...</div>
    </div>
